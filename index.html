<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYNCPATH.HEALTH</title>

  <!-- FAVICON DITAMBAHKAN DI SINI -->
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="shortcut icon" href="./favicon.ico">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #F8F9FA;
      font-family: 'Inter', sans-serif;
    }

    .app-wrapper {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    .main-header {
      height: 35px;
      padding: 0 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #064E3B;
      background-color: #F8F9FA;
      color: #064E3B;
      font-size: 0.8rem;
      flex-shrink: 0;
      z-index: 100;
    }

    .work-space {
      flex-grow: 1;
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .work-space iframe {
      width: 100%;
      height: 100%; /* Mengisi ruang yang tersedia di .work-space */
      border: none;
      display: block;
    }

    .loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 50;
      transition: opacity 0.3s ease;
    }

    .system-status {
      font-size: 0.75rem;
      font-weight: 600;
      background-color: rgba(6, 78, 59, 0.1);
      color: #064E3B;
      padding: 4px 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(6, 78, 59, 0.2);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #064E3B;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(6, 78, 59, 0.3);
    }

    .spinner {
      width: 35px;
      height: 35px;
      border: 3px solid #E2E8F0;
      border-top: 3px solid #064E3B;
      border-radius: 50%;
      animation: putar 0.7s linear infinite;
    }

    @keyframes putar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    
  </style>
</head>
<body>

  <div class="app-wrapper">
    <header class="main-header">
      <div class="header-title">
        <i class="bi bi-shield-check"></i> <span>Tracking Health, Elevating Lives</span>
      </div>
      <div class="system-status">
        <div class="status-dot"></div> System Cloud Active
      </div>
    </header>

    <main class="work-space">
      <div class="loading-screen">
        <div class="spinner"></div>
        <div style="margin-top:10px; font-weight:700; color:#064E3B; font-size:0.75rem;">MEMUAT HALAMAN...</div>
      </div>
      
      <iframe 
        src="https://script.google.com/macros/s/AKfycbz6rhzyV-jYjNcqOg1W926HgtTFD0k_E9w5Py7Iji4k2i8HdveMazn0n0sDhkqp-4-zRQ/exec"
        allow="camera; microphone; geolocation; fullscreen"
        onload="document.querySelector('.loading-screen').style.opacity='0'; setTimeout(()=>{document.querySelector('.loading-screen').style.display='none'},300)">
      </iframe>
    </main>
  </div>
  <script>
    function adjustIframe() {
    const iframe = document.querySelector('iframe');
    // Memaksa lebar dan tinggi iframe mengikuti ukuran jendela browser secara absolut
    iframe.style.width = window.innerWidth + 'px';
    iframe.style.height = window.innerHeight + 'px';
  }

  // Jalankan saat halaman dimuat
  window.addEventListener('load', adjustIframe);
  
  // Jalankan saat HP diputar (penting untuk deteksi portrait/landscape)
  window.addEventListener('resize', adjustIframe);
    
    function hilangkanLoader() {
      const loader = document.querySelector('.loading-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 300);
      }
    }
  </script>
</body>
</html>
