<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SYNC.HEALTH CARE</title>
  
  <!-- Import Font Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    /* 1. RESET DEFAULT BROWSER */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #F8FAFC;
      font-family: 'Inter', sans-serif; /* Menggunakan Font Inter */
    }

    .app-wrapper {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

   /* 2. HEADER */
    .main-header {
      background-color: #F8F9FA; /* Berubah menjadi abu-abu terang */
      color: #064E3B; /* Warna teks diubah ke hijau agar tetap terbaca di background terang */
      height: 50px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); /* Bayangan diperlembut */
      z-index: 10;
    }

    .header-title i {
      color: #064E3B; /* Ikon juga disesuaikan agar senada */
    }

    .system-status {
      font-size: 0.75rem;
      font-weight: 600;
      background-color: rgba(6, 78, 59, 0.1); /* Background status disesuaikan */
      color: #064E3B;
      padding: 4px 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(6, 78, 59, 0.2);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #064E3B; /* Dot status disesuaikan */
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(6, 78, 59, 0.3);
    }
    /* 3. AREA IFRAME */
    .work-space {
      position: relative;
      flex: 1;
      width: 100%;
      background-color: #ffffff;
    }

    .work-space iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      z-index: 2;
    }

    /* 4. LOADING TRANSISI */
    .loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1;
      gap: 12px;
    }

    .spinner {
      width: 38px;
      height: 38px;
      border: 3px solid #E2E8F0;
      border-top: 3px solid #064E3B; /* Spinner hijau tua */
      border-radius: 50%;
      animation: putar 0.7s linear infinite;
    }

    .loading-text {
      font-size: 0.8rem;
      color: #064E3B;
      font-weight: 700;
      letter-spacing: 1px;
    }

    @keyframes putar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="app-wrapper">
    
    <header class="main-header">
      <div class="header-title">
        <i class="bi bi-shield-check"></i>
        <span>CONNECTING CARE, ELEVATING HEALTH</span>
      </div>
      <div class="system-status">
        <div class="status-dot"></div> SYNC.SYSTEM ACTIVE
      </div>
    </header>

    <main class="work-space">
      
      <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">MENGHUBUNGKAN...</div>
      </div>
      
      <iframe 
        src="https://script.google.com/macros/s/AKfycbxlBTDMOocJ8MXMai-d5rO4Y87AdEcOxJCYj5jHxOEEz_dzFNzF1iZy8yraII8E9kuXFg/exec"
        allowfullscreen="true"
        onload="hilangkanLoader()">
      </iframe>

    </main>
  </div>

  <script>
    function hilangkanLoader() {
      const loader = document.querySelector('.loading-screen');
      if (loader) {
        loader.style.transition = 'opacity 0.3s ease-out';
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 300);
      }
    }
  </script>

</body>
</html>
