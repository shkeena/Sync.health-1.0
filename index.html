<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SYNC.HEALTH CARE</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    /* 1. RESET DEFAULT BROWSER */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Mengunci scrollbar utama browser */
      background-color: #F8FAFC;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Struktur Flexbox Layout Atas-Bawah */
    .app-wrapper {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    /* 2. HEADER PROFESIONAL (Charcoal & Sage Green) */
    .main-header {
      background-color: #4A5568; /* Warna abu-abu gelap charcoal senada dengan header tabel Anda */
      color: #ffffff;
      height: 50px; /* Tinggi header yang pas dan tidak memakan ruang kerja */
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      z-index: 10;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    .header-title i {
      color: #8A9A5B; /* Warna Sage Green */
      font-size: 1.1rem;
    }

    .system-status {
      font-size: 0.75rem;
      font-weight: 600;
      background-color: rgba(255, 255, 255, 0.1);
      padding: 4px 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #8A9A5B; /* Sage Green aktif */
      border-radius: 50%;
      box-shadow: 0 0 8px #8A9A5B;
    }

    /* 3. AREA IFRAME FULL LAYAR */
    .work-space {
      position: relative;
      flex: 1; /* Mengambil sisa seluruh tinggi layar di bawah header */
      width: 100%;
      background-color: #ffffff;
    }

    .work-space iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      z-index: 2;
    }

    /* 4. LAYAR LOADING TRANSISI */
    .loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1;
      gap: 12px;
    }

    .spinner {
      width: 38px;
      height: 38px;
      border: 3px solid #E2E8F0;
      border-top: 3px solid #4A5568; /* Charcoal Spinner */
      border-radius: 50%;
      animation: putar 0.7s linear infinite;
    }

    .loading-text {
      font-size: 0.8rem;
      color: #718096;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    @keyframes putar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="app-wrapper">
    
    <header class="main-header">
      <div class="header-title">
        <i class="bi bi-sliders"></i>
        <span>CONNECTING CARE, ELEVATING HEALTH</span>
      </div>
      <div class="system-status">
        <div class="status-dot"></div> Google Cloud Connection
      </div>
    </header>

    <main class="work-space">
      
      <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">SINKRONISASI HALAMAN</div>
      </div>
      
      <iframe 
        src="https://script.google.com/macros/s/AKfycbxlBTDMOocJ8MXMai-d5rO4Y87AdEcOxJCYj5jHxOEEz_dzFNzF1iZy8yraII8E9kuXFg/exec"
        allowfullscreen="true"
        onload="hilangkanLoader()">
      </iframe>

    </main>

  </div>

  <script>
    // Fungsi menghilangkan loading screen saat iframe terisi data murni
    function hilangkanLoader() {
      const loader = document.querySelector('.loading-screen');
      if (loader) {
        loader.style.transition = 'opacity 0.3s ease-out';
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 300);
      }
    }
  </script>

</body>
</html>
