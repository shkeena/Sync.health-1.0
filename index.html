<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <!-- Viewport ini memaksa browser agar tidak melakukan auto-zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYNC.HEALTH CARE</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    /* Reset CSS dasar */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #F8F9FA;
      font-family: 'Inter', sans-serif;
    }

    .app-wrapper {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    /* Header tetap di atas */
    .main-header {
      height: 35px;
      padding: 0 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #064E3B;
      background-color: #F8F9FA;
      color: #064E3B;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

   .work-space {
  width: 100vw;
  height: 100vh;
  position: absolute;
  top: 0;
  left: 0;
  overflow: hidden; /* Mencegah scroll ganda */
}

.work-space iframe {
  width: 100vw;
  height: 100vh;
  border: none;
  display: block;
}
/* Memaksa iframe agar selalu responsif mengikuti perubahan orientasi HP */
  @media screen and (orientation: portrait) {
    .work-space iframe {
      width: 100vw !important;
      height: 100vh !important;
    }
  }

  /* Mengatasi masalah address bar HP yang sering memotong tampilan */
  @media screen and (max-height: 800px) {
    .work-space {
      height: 100% !important;
    }
  }

    /* Loading Screen tetap di atas */
    .loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      transition: opacity 0.3s ease;
    }

    .header-title i {
      color: #064E3B; /* Ikon juga disesuaikan agar senada */
    }
    
    .system-status {
      font-size: 0.75rem;
      font-weight: 600;
      background-color: rgba(6, 78, 59, 0.1); /* Background status disesuaikan */
      color: #064E3B;
      padding: 4px 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(6, 78, 59, 0.2);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #064E3B; /* Dot status disesuaikan */
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(6, 78, 59, 0.3);
    }    
    
    .spinner {
      width: 35px;
      height: 35px;
      border: 3px solid #E2E8F0;
      border-top: 3px solid #064E3B;
      border-radius: 50%;
      animation: putar 0.7s linear infinite;
    }

    .loading-text {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #064E3B;
      font-weight: 700;
    }

    @keyframes putar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
</style>
</head>
<body>

  <div class="app-wrapper">
    <header class="main-header">
      <div class="header-title">
        <i class="bi bi-shield-check"></i> <span>Connecting Care, Elevating Health</span>
      </div>
      <div class="system-status">
        <div class="status-dot"></div> System Cloud Active
      </div>
    </header>

    <main class="work-space">
      <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Sinkronisasi Data...</div>
      </div>
      
      <iframe 
        src="https://script.google.com/macros/s/AKfycbyWgW4YficpmzXTj-gzv9iYREg2N3A8i-c_UQOls8yAAyZa2S3DaGJ3RoBvp2_N7LEk/exec"
        allow="camera; microphone; geolocation; fullscreen"
        onload="hilangkanLoader()">
      </iframe>
    </main>
  </div>

  <script>
    function adjustIframe() {
    const iframe = document.querySelector('iframe');
    // Memaksa lebar dan tinggi iframe mengikuti ukuran jendela browser secara absolut
    iframe.style.width = window.innerWidth + 'px';
    iframe.style.height = window.innerHeight + 'px';
  }

  // Jalankan saat halaman dimuat
  window.addEventListener('load', adjustIframe);
  
  // Jalankan saat HP diputar (penting untuk deteksi portrait/landscape)
  window.addEventListener('resize', adjustIframe);
    
    function hilangkanLoader() {
      const loader = document.querySelector('.loading-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 300);
      }
    }
  </script>
</body>
</html>
